<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kimi Debug Tunnel v2.3 — 调试控制台</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-root: #0d1117;
      --bg-surface: #161b22;
      --bg-elevated: #1c2128;
      --border-default: #30363d;
      --border-accent: #58a6ff;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-muted: #484f58;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --danger: #f85149;
      --danger-bg: rgba(248, 81, 73, 0.12);
      --success: #3fb950;
      --success-bg: rgba(63, 185, 80, 0.12);
      --warning: #d29922;
      --warning-bg: rgba(210, 153, 34, 0.12);
      --info: #58a6ff;
      --info-bg: rgba(88, 166, 255, 0.12);
      --font-mono: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --radius-sm: 4px;
      --radius-md: 6px;
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 12px;
      --spacing-lg: 16px;
      --spacing-xl: 20px;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-root);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 13px;
      line-height: 1.5;
    }

    header {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-default);
      padding: var(--spacing-sm) var(--spacing-lg);
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      flex-wrap: wrap;
    }
    header h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      font-family: var(--font-mono);
    }
    header .version {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: var(--radius-sm);
      background: var(--info-bg);
      color: var(--info);
      font-family: var(--font-mono);
    }

    /* Status indicators */
    .status-group {
      display: flex;
      gap: var(--spacing-lg);
      margin-left: auto;
      align-items: center;
    }
    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-secondary);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.online { background: var(--success); box-shadow: 0 0 6px rgba(63,185,80,0.4); }
    .status-dot.offline { background: var(--danger); }
    .status-dot.warning { background: var(--warning); }

    .client-id {
      font-size: 10px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    /* Layout */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      min-width: 200px;
      background: var(--bg-surface);
      border-right: 1px solid var(--border-default);
      padding: var(--spacing-md);
      overflow-y: auto;
      font-size: 12px;
      display: none;
    }
    @media (min-width: 768px) { .sidebar { display: block; } }

    .sidebar-section { margin-bottom: var(--spacing-lg); }
    .sidebar-section h3 {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: var(--spacing-sm);
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      color: var(--text-secondary);
    }
    .info-row .value {
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 11px;
    }
    .info-row .value.online { color: var(--success); }
    .info-row .value.offline { color: var(--danger); }
    .info-row .value.warn { color: var(--warning); }

    .kbd-hint {
      display: inline-block;
      font-size: 10px;
      padding: 1px 5px;
      border: 1px solid var(--border-default);
      border-radius: 3px;
      background: var(--bg-elevated);
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    /* Content area */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: var(--spacing-md);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
    }

    /* Message bubbles */
    .msg {
      padding: var(--spacing-sm) var(--spacing-md);
      border-radius: var(--radius-md);
      max-width: 88%;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: var(--font-mono);
    }
    .msg.command {
      background: var(--bg-elevated);
      border: 1px solid var(--border-default);
      align-self: flex-start;
      color: var(--text-secondary);
    }
    .msg.response {
      background: var(--success-bg);
      border: 1px solid rgba(63,185,80,0.2);
      align-self: flex-end;
      color: var(--text-primary);
    }
    .msg.streaming {
      border-left: 2px solid var(--accent);
    }
    .msg.system {
      background: transparent;
      align-self: center;
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      padding: var(--spacing-xs) var(--spacing-md);
    }
    .msg.error {
      background: var(--danger-bg);
      border: 1px solid rgba(248,81,73,0.2);
      color: var(--danger);
      align-self: center;
      font-size: 12px;
    }
    .msg .time {
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .msg .meta {
      font-size: 10px;
      color: var(--accent);
      margin-bottom: 4px;
    }

    /* Input area */
    .input-area {
      border-top: 1px solid var(--border-default);
      background: var(--bg-surface);
      padding: var(--spacing-md);
      display: flex;
      gap: var(--spacing-sm);
      align-items: flex-end;
    }
    .input-area textarea {
      flex: 1;
      padding: var(--spacing-sm) var(--spacing-md);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      background: var(--bg-root);
      color: var(--text-primary);
      font-size: 13px;
      font-family: var(--font-mono);
      outline: none;
      resize: vertical;
      min-height: 40px;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    .input-area textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(88,166,255,0.15);
    }
    .input-area textarea::placeholder { color: var(--text-muted); }

    .input-controls {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-xs);
      align-items: flex-end;
    }
    .toggle-row {
      display: flex;
      gap: var(--spacing-md);
      align-items: center;
    }
    .toggle-row label {
      font-size: 11px;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      user-select: none;
    }
    .toggle-row input[type="checkbox"] {
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .btn-send {
      padding: var(--spacing-sm) var(--spacing-lg);
      background: var(--accent);
      border: none;
      border-radius: var(--radius-md);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      font-family: var(--font-sans);
      white-space: nowrap;
    }
    .btn-send:hover { background: var(--accent-hover); }
    .btn-send:disabled { background: var(--text-muted); cursor: not-allowed; }
    .btn-send:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(88,166,255,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 767px) {
      header { padding: var(--spacing-sm); }
      .status-group { gap: var(--spacing-sm); }
      .status-item span:last-child { display: none; }
      .msg { max-width: 95%; font-size: 12px; }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .spinner { animation: none; opacity: 0.6; }
      * { transition-duration: 0s !important; }
    }

    /* Focus visible for all interactive */
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  </style>
</head>
<body>
  <header>
    <h1>Debug Tunnel</h1>
    <span class="version">v2.3</span>
    <div class="status-group">
      <div class="status-item">
        <span class="status-dot offline" id="wsDot" role="img" aria-label="WebSocket status"></span>
        <span id="wsStatus">WS: --</span>
      </div>
      <div class="status-item">
        <span class="status-dot offline" id="wireDot" role="img" aria-label="Wire connection status"></span>
        <span id="wireStatus">Wire: --</span>
      </div>
      <span class="client-id" id="clientId"></span>
    </div>
  </header>

  <div class="main">
    <aside class="sidebar" id="sidebar" aria-label="连接信息面板">
      <div class="sidebar-section">
        <h3>连接状态</h3>
        <div class="info-row"><span>WebSocket</span><span class="value offline" id="siWs">未连接</span></div>
        <div class="info-row"><span>Wire (Kimi Web)</span><span class="value offline" id="siWire">未连接</span></div>
        <div class="info-row"><span>客户端数</span><span class="value" id="siClients">0</span></div>
        <div class="info-row"><span>队列积压</span><span class="value" id="siQueue">0</span></div>
      </div>

      <div class="sidebar-section">
        <h3>快捷操作</h3>
        <div class="info-row"><span>发送</span><span class="kbd-hint">Enter</span></div>
        <div class="info-row"><span>换行</span><span class="kbd-hint">Shift+Enter</span></div>
      </div>

      <div class="sidebar-section">
        <h3>协议版本</h3>
        <div class="info-row"><span>WebSocket</span><span class="value">/ws</span></div>
        <div class="info-row"><span>REST</span><span class="value">/api/status</span></div>
      </div>
    </aside>

    <main class="content">
      <div class="messages" id="messages" role="log" aria-label="消息日志" aria-live="polite">
        <div class="msg system">隧道就绪 — 推送式实时通信 v2.3</div>
      </div>

      <div class="input-area">
        <div style="flex:1;display:flex;flex-direction:column;gap:4px;">
          <textarea id="cmdInput"
            placeholder="输入指令 Enter 发送 Shift+Enter 换行"
            rows="2"
            aria-label="指令输入框"
            autofocus
          ></textarea>
          <div class="toggle-row">
            <label>
              <input type="checkbox" id="chkThinking">
              含思考过程
            </label>
            <label>
              <input type="checkbox" id="chkDirect" checked>
              直接执行 (Wire)
            </label>
          </div>
        </div>
        <button class="btn-send" id="sendBtn" onclick="sendCommand()" aria-label="发送指令">发送</button>
      </div>
    </main>
  </div>

  <script>
    const WS_URL = `ws://${location.host}/ws`;
    let ws, clientId;

    function connect() {
      ws = new WebSocket(WS_URL);
      ws.onopen = () => setWsStatus(true, '已连接');
      ws.onclose = () => { setWsStatus(false, '断开'); setTimeout(connect, 3000); };
      ws.onerror = () => setWsStatus(false, '错误');
      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'system' && msg.clientId) {
            clientId = msg.clientId;
            document.getElementById('clientId').textContent = clientId.slice(0, 8);
            setWireStatus(msg.wireConnected, msg.wireConnected ? '已连接' : '断开');
            updateSidebarStats(msg);
          }
          if (msg.type === 'response' || msg.type === 'error') {
            updateStreamingMessage(msg);
          } else {
            addMessage(msg);
          }
        } catch {}
      };
    }

    function setWsStatus(ok, text) {
      const dot = document.getElementById('wsDot');
      dot.className = 'status-dot ' + (ok ? 'online' : 'offline');
      document.getElementById('wsStatus').textContent = 'WS: ' + text;
      const siEl = document.getElementById('siWs');
      siEl.textContent = text;
      siEl.className = 'value ' + (ok ? 'online' : 'offline');
    }

    function setWireStatus(ok, text) {
      const dot = document.getElementById('wireDot');
      dot.className = 'status-dot ' + (ok ? 'online' : 'offline');
      document.getElementById('wireStatus').textContent = 'Wire: ' + text;
      const siEl = document.getElementById('siWire');
      siEl.textContent = text;
      siEl.className = 'value ' + (ok ? 'online' : 'offline');
    }

    function updateSidebarStats(msg) {
      if (msg.clientCount !== undefined)
        document.getElementById('siClients').textContent = msg.clientCount;
      if (msg.incomingQueueLength !== undefined)
        document.getElementById('siQueue').textContent = msg.incomingQueueLength;
    }

    let streamingMsgEl = null;

    function updateStreamingMessage(msg) {
      if (!streamingMsgEl) {
        streamingMsgEl = createMsgEl('response streaming');
        document.getElementById('messages').appendChild(streamingMsgEl);
      }
      const time = new Date().toLocaleTimeString();
      if (msg.type === 'error') {
        streamingMsgEl.className = 'msg error';
        streamingMsgEl.innerHTML = `<div class="time">${time}</div>${esc(msg.content)}`;
      } else {
        const meta = msg.turnComplete !== undefined
          ? `<div class="meta">${msg.turnComplete ? '完成' : '进行中'}${msg.finishReason ? ' · ' + msg.finishReason : ''}</div>`
          : '';
        streamingMsgEl.innerHTML = `<div class="time">${time}</div>${meta}<div>${esc(msg.content || '')}</div>`;
        if (msg.turnComplete) {
          streamingMsgEl.className = 'msg response';
          streamingMsgEl = null;
        }
      }
      scrollBottom();
    }

    function addMessage(msg) {
      if (msg.type === 'response' || msg.type === 'error') {
        updateStreamingMessage(msg);
        return;
      }
      streamingMsgEl = null;
      const div = createMsgEl(msg.type || 'system');
      div.innerHTML = `<div class="time">${new Date(msg.timestamp || Date.now()).toLocaleTimeString()}</div>${esc(msg.content || '')}`;
      document.getElementById('messages').appendChild(div);
      scrollBottom();
    }

    function createMsgEl(className) {
      const div = document.createElement('div');
      div.className = 'msg ' + className;
      return div;
    }

    function scrollBottom() {
      const container = document.getElementById('messages');
      container.scrollTop = container.scrollHeight;
    }

    async function sendCommand() {
      const input = document.getElementById('cmdInput');
      const text = input.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

      const direct = document.getElementById('chkDirect').checked;
      const thinking = document.getElementById('chkThinking').checked;

      addMessage({ type: 'command', content: text, timestamp: new Date().toISOString() });

      if (direct) {
        streamingMsgEl = null;
        const loadingDiv = createMsgEl('response streaming');
        loadingDiv.innerHTML = '<span class="spinner"></span> 处理中';
        loadingDiv.setAttribute('aria-label', '正在处理请求');
        document.getElementById('messages').appendChild(loadingDiv);
        scrollBottom();
      }

      ws.send(JSON.stringify({
        type: 'command',
        content: text,
        execute_direct: direct,
        include_thinking: thinking,
      }));
      input.value = '';
      input.style.height = 'auto';
      input.focus();
    }

    function esc(text) {
      const el = document.createElement('span');
      el.textContent = text;
      return el.innerHTML;
    }

    document.getElementById('cmdInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendCommand();
      }
    });

    // Status polling
    setInterval(async () => {
      try {
        const res = await fetch('/api/status');
        if (!res.ok) return;
        const status = await res.json();
        document.getElementById('siClients').textContent = status.clientCount;
        document.getElementById('siQueue').textContent = status.incomingQueueLength;
        setWireStatus(status.wireConnected, status.wireConnected ? '已连接' : '断开');
      } catch {}
    }, 3000);

    connect();
  </script>
</body>
</html>
